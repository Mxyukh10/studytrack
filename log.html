<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log Session — StudyTrack</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="mobile-header">
  <div class="logo-mark">
    <div class="logo-icon">📚</div>
    <div class="logo-text">Study<span>Track</span></div>
  </div>
  <button class="hamburger" id="hamburger" aria-label="Open menu">☰</button>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-shell">
<div id="sidebar-container"></div>

<main class="main-content">

<div class="date-banner">
  <div class="date-dot"></div>
  <span id="dateBannerText"></span>
</div>

<div class="page-header">
  <h1 class="page-title">Log a <span>Session</span></h1>
  <p class="page-subtitle">Record what you studied, for how long, and how hard you worked.</p>
</div>

<div style="display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start;">

<div class="form-card animate-in">
  <div class="form-grid">

    <div class="form-group full-width">
      <label class="form-label"><span class="label-icon">📖</span> Subject</label>
      <input type="text" class="form-input" id="inputSubject" placeholder="e.g. DSA, Physics, Mathematics…" autocomplete="off"/>
    </div>

    <div class="form-group">
      <label class="form-label"><span class="label-icon">⏱️</span> Duration (minutes)</label>
      <input type="number" class="form-input" id="inputDuration" placeholder="e.g. 90" min="1" max="720"/>
      <span class="form-hint" id="durationHint">— hrs — mins</span>
    </div>

    <div class="form-group">
      <label class="form-label"><span class="label-icon">🧩</span> Questions Solved</label>
      <input type="number" class="form-input" id="inputQuestions" placeholder="e.g. 20" min="0"/>
      <span class="form-hint">Leave 0 if not applicable</span>
    </div>

    <div class="form-group">
      <label class="form-label"><span class="label-icon">📅</span> Date</label>
      <input type="date" class="form-input" id="inputDate" required/>
    </div>

    <div class="form-group">
      <label class="form-label"><span class="label-icon">📝</span> Notes</label>
      <input type="text" class="form-input" id="inputNotes" placeholder="What did you cover? Any blockers?"/>
    </div>

    <div class="form-group full-width">
      <label class="form-label"><span class="label-icon">⚡</span> Difficulty</label>
      <div class="difficulty-picker">
        <div>
          <input type="radio" name="difficulty" value="Easy" class="diff-option" id="diffEasy"/>
          <label class="diff-label" for="diffEasy">😊 Easy</label>
        </div>
        <div>
          <input type="radio" name="difficulty" value="Medium" class="diff-option" id="diffMedium" checked/>
          <label class="diff-label" for="diffMedium">😤 Medium</label>
        </div>
        <div>
          <input type="radio" name="difficulty" value="Hard" class="diff-option" id="diffHard"/>
          <label class="diff-label" for="diffHard">🔥 Hard</label>
        </div>
      </div>
    </div>

  </div>

  <div class="form-actions">
    <button class="btn btn-primary" id="submitSessionBtn" style="flex:1;justify-content:center;">✅ Save Session</button>
    <button class="btn btn-secondary" id="clearFormBtn">🗑️ Clear</button>
  </div>
</div>

<div style="display:flex;flex-direction:column;gap:16px;">
  <div class="card animate-in">
    <div class="chart-title" style="margin-bottom:16px;">👁️ Live Preview</div>
    <div style="display:flex;flex-direction:column;gap:2px;">
      <div class="preview-row"><span class="preview-label">Subject</span><span class="preview-value" id="previewSubject">—</span></div>
      <div class="preview-row"><span class="preview-label">Duration</span><span class="preview-value" id="previewDuration">—</span></div>
      <div class="preview-row"><span class="preview-label">Questions</span><span class="preview-value" id="previewQuestions">—</span></div>
      <div class="preview-row"><span class="preview-label">Difficulty</span><span class="preview-value" id="previewDifficulty">Medium</span></div>
      <div class="preview-row"><span class="preview-label">Date</span><span class="preview-value" id="previewDate">—</span></div>
      <div class="preview-row" id="previewNotesRow" style="display:none;">
        <span class="preview-label">Notes</span>
        <span class="preview-value" id="previewNotes" style="text-align:right;max-width:170px;word-break:break-word;"></span>
      </div>
    </div>
  </div>
</div>

</div>
</main>
</div>

<div class="toast" id="toast"><span id="toastMsg">Session saved!</span></div>

<script src="script.js"></script>
<script>
fetch("components/sidebar.html").then(r=>r.text()).then(data=>{
  document.getElementById("sidebar-container").innerHTML=data;
  updateStreakBadge(); // ← FIX
  document.querySelectorAll(".sidebar .nav-item").forEach(l=>{
    if(window.location.pathname.includes(l.getAttribute("href"))) l.classList.add("active");
  });
  const hb=document.getElementById("hamburger"),sb=document.getElementById("sidebar"),ov=document.getElementById("sidebarOverlay");
  if(hb&&sb){
    hb.addEventListener("click",()=>{sb.classList.toggle("open");ov.classList.toggle("open");});
    ov.addEventListener("click",()=>{sb.classList.remove("open");ov.classList.remove("open");});
  }
});

const subjectEl=document.getElementById("inputSubject"),
      durationEl=document.getElementById("inputDuration"),
      questionsEl=document.getElementById("inputQuestions"),
      dateEl=document.getElementById("inputDate"),
      notesEl=document.getElementById("inputNotes"),
      hintEl=document.getElementById("durationHint");
const DIFF_EMOJI={Easy:"😊 Easy",Medium:"😤 Medium",Hard:"🔥 Hard"};
const DIFF_COLOR={Easy:"var(--easy)",Medium:"var(--medium)",Hard:"var(--hard)"};
function updatePreview(){
  document.getElementById("previewSubject").textContent=subjectEl.value.trim()||"—";
  const mins=parseInt(durationEl.value)||0;
  if(mins>0){
    const h=Math.floor(mins/60),m=mins%60;
    const p=[]; if(h>0)p.push(h+"h"); if(m>0)p.push(m+"m");
    document.getElementById("previewDuration").textContent=p.join(" ");
    hintEl.textContent=p.join(" ");
  } else { document.getElementById("previewDuration").textContent="—"; hintEl.textContent="— hrs — mins"; }
  const q=parseInt(questionsEl.value);
  document.getElementById("previewQuestions").textContent=(!isNaN(q)&&q>0)?q:"—";
  const diff=document.querySelector("input[name='difficulty']:checked");
  if(diff){
    const pd=document.getElementById("previewDifficulty");
    pd.textContent=DIFF_EMOJI[diff.value]||diff.value;
    pd.style.color=DIFF_COLOR[diff.value]||"";
  }
  if(dateEl.value){
    const[y,m,d]=dateEl.value.split("-");
    document.getElementById("previewDate").textContent=`${d}-${m}-${y}`;
  } else { document.getElementById("previewDate").textContent="—"; }
  const notes=notesEl.value.trim();
  if(notes){
    document.getElementById("previewNotes").textContent=notes;
    document.getElementById("previewNotesRow").style.display="flex";
  } else { document.getElementById("previewNotesRow").style.display="none"; }
}
[subjectEl,durationEl,questionsEl,dateEl,notesEl].forEach(el=>el.addEventListener("input",updatePreview));
document.querySelectorAll("input[name='difficulty']").forEach(r=>r.addEventListener("change",updatePreview));
document.getElementById("clearFormBtn").addEventListener("click",()=>{
  subjectEl.value=""; durationEl.value=""; questionsEl.value=""; notesEl.value="";
  document.getElementById("diffMedium").checked=true; updatePreview();
});
updatePreview();
(function(){
  const p=new URLSearchParams(window.location.search);
  const s=p.get("subject"), d=p.get("duration");
  if(s) subjectEl.value=s;
  if(d) durationEl.value=d;
  if(s||d) updatePreview();
})();
</script>
</body>
</html>
