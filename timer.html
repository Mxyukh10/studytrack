<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Timer — StudyTrack</title>
<link rel="stylesheet" href="style.css"/>
<style>
.timer-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 64px);gap:0;text-align:center;padding:40px 32px;}
.timer-title{font-family:var(--font-display);font-size:2.4rem;font-weight:800;color:var(--text-primary);letter-spacing:-.5px;margin-bottom:8px;}
.timer-title span{color:var(--accent);}
.timer-subtitle{color:var(--text-muted);font-size:.9rem;margin-bottom:32px;}
.timer-subject-wrap{width:100%;max-width:420px;margin-bottom:28px;}
.timer-subject{width:100%;text-align:center;font-size:1rem;padding:14px 20px;border-radius:var(--radius-lg);background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);transition:all .2s ease;}
.timer-subject:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);background:var(--bg-surface);}
.timer-subject.invalid{border-color:var(--red);box-shadow:0 0 0 3px rgba(248,113,113,.15);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.timer-status{font-family:var(--font-mono);font-size:.72rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;height:20px;margin-bottom:10px;transition:color .3s;}
.timer-status.running{color:var(--accent);}
.timer-status.paused{color:var(--orange);}
.timer-display{font-family:var(--font-display);font-size:clamp(56px,10vw,92px);font-weight:800;letter-spacing:4px;color:var(--text-primary);line-height:1;margin-bottom:36px;transition:color .3s;font-variant-numeric:tabular-nums;}
.timer-display.running{color:var(--accent);text-shadow:0 0 40px rgba(181,242,61,.2);}
.timer-display.paused{color:var(--orange);}
.timer-controls{display:flex;gap:12px;margin-bottom:44px;align-items:center;}
.timer-controls .btn{min-width:92px;justify-content:center;font-size:.9rem;padding:11px 20px;border-radius:var(--radius-lg);}
.btn-pause{background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border);}
.btn-pause:hover{background:var(--bg-card-hover);color:var(--text-primary);border-color:var(--border-light);}
.btn-pause.active{background:rgba(251,146,60,.12);color:var(--orange);border-color:rgba(251,146,60,.3);}
.waveform-wrap{width:100%;max-width:520px;height:80px;position:relative;overflow:hidden;opacity:0;transition:opacity .6s ease;}
.waveform-wrap.visible{opacity:1;}
</style>
</head>
<body>

<div class="mobile-header">
  <div class="logo-mark">
    <div class="logo-icon">📚</div>
    <div class="logo-text">Study<span>Track</span></div>
  </div>
  <button class="hamburger" id="hamburger">☰</button>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-shell">
<div id="sidebar-container"></div>

<main class="main-content timer-page">
  <h1 class="timer-title">Focus <span>Session</span></h1>
  <p class="timer-subtitle">Track a live study session and log it automatically.</p>
  <div class="timer-subject-wrap">
    <input id="timerSubject" class="form-input timer-subject" placeholder="What are you studying?" autocomplete="off"/>
  </div>
  <div class="timer-status" id="timerStatus">ready</div>
  <div id="timerDisplay" class="timer-display">00:00:00</div>
  <div class="timer-controls">
    <button class="btn btn-primary" id="btnStart" onclick="startTimer()">▶ Start</button>
    <button class="btn btn-pause"   id="btnPause" onclick="pauseTimer()">⏸ Pause</button>
    <button class="btn btn-danger"  id="btnStop"  onclick="stopTimer()">⏹ Stop</button>
  </div>
  <div class="waveform-wrap" id="waveformWrap">
    <canvas id="waveformCanvas"></canvas>
  </div>
</main>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script src="script.js"></script>
<script>
fetch("components/sidebar.html").then(r=>r.text()).then(data=>{
  document.getElementById("sidebar-container").innerHTML=data;
  updateStreakBadge(); // ← FIX
  document.querySelectorAll(".sidebar .nav-item").forEach(l=>{
    if(window.location.pathname.includes(l.getAttribute("href"))) l.classList.add("active");
  });
  const hb=document.getElementById("hamburger"),sb=document.getElementById("sidebar"),ov=document.getElementById("sidebarOverlay");
  if(hb&&sb){
    hb.addEventListener("click",()=>{sb.classList.toggle("open");ov.classList.toggle("open");});
    ov.addEventListener("click",()=>{sb.classList.remove("open");ov.classList.remove("open");});
  }
});

let timerInterval=null,seconds=0,running=false,paused=false;
const display=document.getElementById("timerDisplay"),statusEl=document.getElementById("timerStatus");
const btnStart=document.getElementById("btnStart"),btnPause=document.getElementById("btnPause");
const subjectEl=document.getElementById("timerSubject");
function pad(n){return String(n).padStart(2,"0");}
function updateDisplay(){const h=Math.floor(seconds/3600),m=Math.floor((seconds%3600)/60),s=seconds%60;display.textContent=`${pad(h)}:${pad(m)}:${pad(s)}`;}
function showToast(msg){const t=document.getElementById("toast"),tx=document.getElementById("toastMsg");if(!t)return;tx.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function startTimer(){
  if(running)return;
  const subj=subjectEl.value.trim();
  if(!subj){subjectEl.classList.add("invalid");subjectEl.focus();setTimeout(()=>subjectEl.classList.remove("invalid"),600);showToast("Enter a subject first!");return;}
  running=true;paused=false;subjectEl.disabled=true;
  timerInterval=setInterval(()=>{seconds++;updateDisplay();},1000);
  display.classList.add("running");display.classList.remove("paused");
  statusEl.textContent="● recording";statusEl.className="timer-status running";
  btnStart.disabled=true;btnStart.style.opacity=".4";btnPause.classList.remove("active");
  startWaveform();
}
function pauseTimer(){
  if(!running&&!paused)return;
  if(running){
    running=false;paused=true;clearInterval(timerInterval);
    display.classList.remove("running");display.classList.add("paused");
    statusEl.textContent="⏸ paused";statusEl.className="timer-status paused";
    btnPause.textContent="▶ Resume";btnPause.classList.add("active");
    pauseWaveform();
  } else {
    running=true;paused=false;timerInterval=setInterval(()=>{seconds++;updateDisplay();},1000);
    display.classList.add("running");display.classList.remove("paused");
    statusEl.textContent="● recording";statusEl.className="timer-status running";
    btnPause.textContent="⏸ Pause";btnPause.classList.remove("active");
    resumeWaveform();
  }
}
function stopTimer(){
  if(!running&&!paused&&seconds===0)return;
  const subj=subjectEl.value.trim();
  if(!subj){subjectEl.classList.add("invalid");subjectEl.focus();setTimeout(()=>subjectEl.classList.remove("invalid"),600);showToast("Enter a subject first!");return;}
  clearInterval(timerInterval);running=false;paused=false;stopWaveform();
  let minutes=Math.round(seconds/60);
  if(minutes===0&&seconds>0)minutes=1;
  if(minutes===0){showToast("Start the timer first!");return;}
  showToast(`Logged ${minutes} min — redirecting…`);
  setTimeout(()=>{window.location.href="log.html?subject="+encodeURIComponent(subj)+"&duration="+minutes;},900);
}

const canvas=document.getElementById("waveformCanvas"),ctx=canvas.getContext("2d"),wrap=document.getElementById("waveformWrap");
let waveRAF=null,waveActive=false,wavePhase=0;
const WAVES=[{freq:.018,amp:.55,speed:.048,color:"rgba(77,217,232,0.75)",width:2.5},{freq:.026,amp:.32,speed:.076,color:"rgba(77,217,232,0.4)",width:1.5},{freq:.012,amp:.22,speed:.028,color:"rgba(77,217,232,0.2)",width:1}];
function resizeCanvas(){canvas.width=wrap.offsetWidth*(window.devicePixelRatio||1);canvas.height=wrap.offsetHeight*(window.devicePixelRatio||1);}
function drawWave(){
  resizeCanvas();const dpr=window.devicePixelRatio||1;ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/dpr,cy=canvas.height/dpr/2;
  WAVES.forEach((w,i)=>{const phase=wavePhase*w.speed+i*1.3;ctx.save();ctx.scale(dpr,dpr);ctx.beginPath();ctx.strokeStyle=w.color;ctx.lineWidth=w.width;ctx.shadowColor="rgba(77,217,232,.45)";ctx.shadowBlur=10;for(let x=0;x<=cx;x+=2){const y=cy+Math.sin(x*w.freq+phase)*(cy*w.amp);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();ctx.restore();});
  if(waveActive){wavePhase++;waveRAF=requestAnimationFrame(drawWave);}
}
function startWaveform(){wrap.classList.add("visible");waveActive=true;waveRAF=requestAnimationFrame(drawWave);}
function pauseWaveform(){
  waveActive=false;cancelAnimationFrame(waveRAF);const dpr=window.devicePixelRatio||1;resizeCanvas();ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/dpr,cy=canvas.height/dpr/2;
  WAVES.forEach((w,i)=>{const phase=wavePhase*w.speed+i*1.3;ctx.save();ctx.scale(dpr,dpr);ctx.beginPath();ctx.strokeStyle=w.color.replace(/[\d.]+\)$/,"0.12)");ctx.lineWidth=w.width;for(let x=0;x<=cx;x+=2){const y=cy+Math.sin(x*w.freq+phase)*(cy*w.amp);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();ctx.restore();});
}
function resumeWaveform(){waveActive=true;waveRAF=requestAnimationFrame(drawWave);}
function stopWaveform(){waveActive=false;cancelAnimationFrame(waveRAF);wrap.classList.remove("visible");ctx.clearRect(0,0,canvas.width,canvas.height);}
window.addEventListener("resize",()=>{if(waveActive)resizeCanvas();});
</script>
</body>
</html>
